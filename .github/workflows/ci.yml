name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-and-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Rust format
        run: cargo fmt --all --check
      - name: Rust lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Deterministic core tests
        run: cargo test -p loyalty-core
      - name: Anchor program unit tests
        run: cargo test -p coalition-passport --lib
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clients/passport-cli/package-lock.json
      - name: CLI install, build, test, and production audit
        working-directory: clients/passport-cli
        run: |
          npm ci
          npm run build
          npm test
          npm audit --omit=dev
